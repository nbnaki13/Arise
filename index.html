/* ============ ARISE DESIGN SYSTEM ============
   One accent. One signature element (the System Window).
   Everything else stays quiet. */
:root{
  --void:#060A13;
  --panel:rgba(140,190,255,0.045);
  --panel-2:rgba(140,190,255,0.07);
  --line:rgba(140,190,255,0.14);
  --line-soft:rgba(140,190,255,0.08);
  --system:#6CB2FF;
  --system-dim:rgba(108,178,255,0.55);
  --text:#E7EEF9;
  --muted:#8A96AB;
  --faint:#5A6478;
  --decay:#F2707F;
  --r-lg:16px; --r-md:12px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--void);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overscroll-behavior-y:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(640px 320px at 50% -120px,rgba(108,178,255,0.075),transparent 70%);z-index:0}
#root{position:relative;z-index:1}
::selection{background:rgba(108,178,255,0.25)}
::-webkit-scrollbar{width:0;height:0}
input,select,textarea,button{font-family:inherit;color:inherit}
input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--system);outline-offset:2px}
.sys{font-family:'Chakra Petch',sans-serif;text-transform:uppercase;letter-spacing:.14em}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.eyebrow{font-family:'Chakra Petch',sans-serif;text-transform:uppercase;letter-spacing:.18em;font-size:.625rem;font-weight:600;color:var(--faint)}
.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r-lg)}
button{cursor:pointer;background:none;border:none}
@keyframes sysIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fillIn{from{width:0}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
/* the signature: System Window */
.syswin{background:linear-gradient(180deg,rgba(108,178,255,0.10),rgba(108,178,255,0.035) 30%,rgba(6,10,19,0.6));border:1px solid rgba(108,178,255,0.35);border-radius:var(--r-lg);box-shadow:0 0 0 1px rgba(108,178,255,0.08),0 0 34px rgba(108,178,255,0.10),inset 0 1px 0 rgba(108,178,255,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:sysIn .38s cubic-bezier(.22,1,.36,1)}
.syswin-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(108,178,255,0.16)}
.syswin-dot{width:6px;height:6px;border-radius:50%;background:var(--system);box-shadow:0 0 8px var(--system)}
.bar{height:6px;border-radius:3px;background:rgba(140,190,255,0.10);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:3px;background:var(--system);transition:width .5s cubic-bezier(.22,1,.36,1)}
.bar.done>i{background:#9CCBFF}
.tapbtn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:var(--r-md);background:var(--panel);color:var(--text);font-weight:600;transition:background .15s,transform .1s}
.tapbtn:active{background:var(--panel-2);transform:scale(.98)}
.tapbtn.primary{border-color:rgba(108,178,255,0.45);background:rgba(108,178,255,0.10)}
.tapbtn.on{border-color:rgba(108,178,255,0.5);background:rgba(108,178,255,0.13)}
.qicon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:11px;border:1px solid var(--line-soft);background:rgba(140,190,255,0.05);color:var(--system-dim)}
.qicon-done{width:28px;height:28px;border-radius:9px;background:rgba(108,178,255,0.08)}
.qcard{box-shadow:0 1px 0 rgba(255,255,255,0.02) inset}
.qrow{transition:background .15s}.qrow:active{background:var(--panel-2)}
.syswin-decay{border-color:rgba(242,112,127,0.35);background:linear-gradient(180deg,rgba(242,112,127,0.08),rgba(242,112,127,0.02) 40%,rgba(6,10,19,0.6));box-shadow:0 0 0 1px rgba(242,112,127,0.06),0 0 30px rgba(242,112,127,0.07),inset 0 1px 0 rgba(242,112,127,0.14)}

.field input,.field select{width:100%;padding:11px 12px;border-radius:var(--r-md);border:1px solid var(--line);background:rgba(6,10,19,.6);font-size:.9375rem}

<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

/* ================================================================
   DATE HELPERS (all LOCAL time; Asia/Kathmandu on device)
================================================================ */
const pad2 = n => String(n).padStart(2,"0");
const ld = (d=new Date()) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseLd = s => { const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); };
const addDays = (s,n) => { const d=parseLd(s); d.setDate(d.getDate()+n); return ld(d); };
const weekday = s => parseLd(s).getDay();               // 0=Sun
const weekStart = s => addDays(s, -weekday(s));          // Sunday-start week
const daysBetween = (a,b) => Math.round((parseLd(b)-parseLd(a))/86400000);
const fmtDay = s => parseLd(s).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});

/* ================================================================
   ENGINE — pure functions only. No UI concerns below this line.
================================================================ */

/* Automaticity: Lally et al. 2010 asymptotic model.
   A = 100·(1 − e^(−k·R)), k chosen so 66 effective reps ≈ 95%. */
const K_AUTO = -Math.log(0.05)/66;
const automaticity = R => 100*(1-Math.exp(-K_AUTO*Math.max(0,R)));
const stageOf = a => a>=95 ? "Installed" : a>=70 ? "Nearly automatic" : a>=30 ? "Forming" : "Effortful";

const isScheduled = (q,dateStr) => {
  if (q.schedule.kind==="weekly") return true;           // any day can host a session
  if (q.schedule.kind==="days") return q.schedule.days.includes(weekday(dateStr));
  return true;                                            // daily
};

/* raw logged value for a quest on a date */
const rawP = (log,dateStr,qid) => (log[dateStr]||{})[qid];
const hasP = (log,dateStr,qid) => log[dateStr]!==undefined && log[dateStr][qid]!==undefined;
const numP = (log,dateStr,q) => {
  const v = rawP(log,dateStr,q.id);
  if (v===undefined) return 0;
  if (q.type==="checklist") return Object.values(v||{}).filter(Boolean).length;
  return Number(v)||0;
};
const targetOf = q => q.type==="checklist" ? q.items.length : q.type==="binary" ? 1 : q.target;

/* Forward scan of one DAILY-type quest from creation to `upTo`.
   Produces per-day status + effective reps with the miss-decay rule:
   1st consecutive miss: no decay ("never miss twice").
   nth consecutive miss (n≥2): R −= (n−1). Floor 0. */
function scanDaily(q, log, upTo){
  const statuses = {};                     // date -> 'complete'|'recovery'|'missed'|'pending'|'off'
  let R=0, missRun=0, prevIncomplete=false;
  const today = upTo;
  for (let d=q.createdAt; d<=today; d=addDays(d,1)){
    if (!isScheduled(q,d)){ statuses[d]="off"; continue; }
    const recoveryActive = prevIncomplete && q.recovery!==undefined;
    const p = numP(log,d,q);
    const full = p >= targetOf(q);
    const rec = !full && recoveryActive && p >= q.recovery;
    const isToday = d===today;
    if (full || rec){
      statuses[d] = rec ? "recovery" : "complete";
      R += 1; missRun = 0; prevIncomplete = false;
    } else if (isToday){
      statuses[d] = "pending";             // today never counts as a miss yet
      // prevIncomplete unchanged for lookahead (irrelevant at end)
    } else {
      statuses[d] = "missed";
      missRun += 1;
      if (missRun >= 2) R = Math.max(0, R-(missRun-1));
      prevIncomplete = true;
    }
  }
  return { R, statuses, missRun };
}

/* Weekly-gate quest (e.g. workout 5×/week). Sessions logged per day.
   Automaticity runs on WEEK units scaled ×7 (66 reps ≈ ~9.5 weeks). */
function scanWeekly(q, log, upTo){
  const start = weekStart(q.createdAt);
  const thisWeek = weekStart(upTo);
  let R=0, missRun=0;
  const weeks = [];
  for (let w=start; w<thisWeek; w=addDays(w,7)){
    let s=0; for (let i=0;i<7;i++) s += numP(log,addDays(w,i),q)>0 ? 1 : 0;
    const hit = s >= q.perWeek;
    weeks.push({week:w, sessions:s, hit});
    if (hit){ R += 7; missRun=0; }
    else { missRun += 1; if (missRun>=2) R = Math.max(0, R-(missRun-1)*2); }
  }
  let cur=0; for (let i=0;i<7;i++){ const d=addDays(thisWeek,i); if (d<=upTo) cur += numP(log,d,q)>0?1:0; }
  return { R, weeks, current:{week:thisWeek, sessions:cur} , missRun };
}

function questState(q, log, today){
  if (q.schedule.kind==="weekly"){
    const s = scanWeekly(q,log,today);
    return { kind:"weekly", A:automaticity(s.R), scan:s };
  }
  const s = scanDaily(q,log,today);
  const recoveryActive = (()=> {
    // active today if the most recent scheduled day before today is missed
    let d = addDays(today,-1);
    while (d>=q.createdAt && !isScheduled(q,d)) d = addDays(d,-1);
    return d>=q.createdAt && s.statuses[d]==="missed" && q.recovery!==undefined;
  })();
  return { kind:"daily", A:automaticity(s.R), scan:s, recoveryActive };
}

/* Vitality Score for one day: weighted, partial credit, renormalized
   across the quests active/scheduled that day. */
function vitality(quests, log, dateStr){
  let wSum=0, credit=0;
  for (const q of quests){
    if (q.archived || q.createdAt>dateStr) continue;
    if (q.schedule.kind==="weekly"){
      const w = weekStart(dateStr);
      let s=0; for(let i=0;i<7;i++){ const d=addDays(w,i); if(d<=dateStr) s += numP(log,d,q)>0?1:0; }
      const expected = q.perWeek * (weekday(dateStr)+1)/7;
      wSum += q.weight; credit += q.weight * Math.min(1, expected>0 ? s/expected : 1);
    } else if (isScheduled(q,dateStr)){
      wSum += q.weight; credit += q.weight * Math.min(1, numP(log,dateStr,q)/targetOf(q));
    }
  }
  return wSum>0 ? Math.round(100*credit/wSum) : 0;
}

/* Impact ledger: cumulative real quantities + real-equivalence milestones */
function ledgerTotal(q, log){
  let t=0;
  for (const d in log){ if (d>=q.createdAt){ const v=numP(log,d,q); t += q.type==="binary" ? (v>=1?1:0) : q.type==="checklist" ? (v>=q.items.length?1:0) : v; } }
  return t;
}
const MILESTONES = {
  steps: { conv:t=>t*0.00074, unit:"km", label:"walked",
    marks:[[50,"50 km on foot"],[100,"100 km — a Kathmandu Valley rim trail"],[200,"200 km — Kathmandu to Pokhara"],[500,"500 km walked"],[885,"885 km — the length of Nepal, east to west"],[2000,"2,000 km on foot"]]},
  water: { conv:t=>t, unit:"L", label:"drunk",
    marks:[[50,"50 litres logged"],[100,"100 litres"],[500,"500 litres"],[1000,"1,000 litres — a cubic metre of water"]]},
  reading:{ conv:t=>t, unit:"pages", label:"read",
    marks:[[280,"1 book finished (≈280 pages)"],[1400,"5 books"],[3360,"12 books — a book a month pace"],[7000,"25 books"],[14000,"50 books"]]},
  meditation:{ conv:t=>t*10/60, unit:"h", label:"meditated",
    marks:[[10,"10 hours of practice"],[19,"~8-week study threshold reached"],[50,"50 hours"],[100,"100 hours"],[250,"250 hours"]]},
  clean:{ conv:t=>t, unit:"days", label:"clean",
    marks:[[7,"7 clean days"],[30,"30 clean days"],[66,"66 clean days — the habit median"],[100,"100 clean days"],[365,"a clean year"]]},
  workout:{ conv:t=>t, unit:"sessions", label:"trained",
    marks:[[10,"10 sessions"],[50,"50 sessions"],[100,"100 sessions"],[250,"250 sessions"]]},
  wake:{ conv:t=>t, unit:"mornings", label:"won",
    marks:[[7,"7 mornings"],[30,"30 mornings"],[66,"66 mornings — the habit median"],[100,"100 mornings"],[365,"a year of 6 AMs"]]},
  bed:{ conv:t=>t, unit:"nights", label:"on schedule",
    marks:[[7,"7 nights on schedule"],[30,"30 nights"],[66,"66 nights"],[100,"100 nights"],[365,"a regular year"]]},
  supplements:{ conv:t=>t, unit:"days", label:"covered",
    marks:[[30,"30 days covered"],[100,"100 days"],[365,"a covered year"]]},
};
function ledgerFor(q, log){
  const m = MILESTONES[q.ledger]; if(!m) return null;
  const raw = ledgerTotal(q,log);
  const val = m.conv(raw);
  const next = m.marks.find(([v])=>val<v);
  const hit  = m.marks.filter(([v])=>val>=v);
  return { val, unit:m.unit, label:m.label, next, hit, marks:m.marks };
}

/* ================================================================
   EVIDENCE — the studies behind the numbers. Associations, not promises.
================================================================ */
const EVIDENCE = [
  { id:"steps", title:"Why 10,000 steps", src:"Paluch et al., 2022 · Lancet Public Health (meta-analysis, ~47,000 adults)",
    body:"Pooled cohort data found all-cause mortality risk falls steeply as daily steps rise, with most of the observed benefit reached around 8,000 to 10,000 steps per day for adults under 60. Your 10K target sits at the top of that range." },
  { id:"habit", title:"Why automaticity, not points", src:"Lally et al., 2010 · European Journal of Social Psychology (UCL)",
    body:"Participants repeating a daily behavior showed habit strength rising along an asymptotic curve, plateauing after a median of about 66 days (range 18 to 254). Missing a single day barely affected the curve. Arise models your per-habit percentage on exactly this curve, which is why one miss costs you almost nothing and consecutive misses cost real progress." },
  { id:"who", title:"Why 5 workouts a week", src:"WHO physical activity guidelines, 2020",
    body:"The guideline for adults is 150 to 300 minutes of moderate activity per week (or 75 to 150 vigorous). Five sessions comfortably covers the range for most training styles." },
  { id:"sleep", title:"Why fixed bed and wake times", src:"Windred et al., 2023 · Sleep (UK Biobank cohort)",
    body:"Sleep regularity, meaning consistent timing day to day, predicted mortality risk in cohort data even more strongly than sleep duration. Arise scores your consistency against your fixed 22:00 and 06:00 anchors rather than counting hours." },
  { id:"sugar", title:"Why clean eating is tracked daily", src:"WHO guideline on free sugars, 2015",
    body:"WHO recommends keeping free sugars under 10% of energy intake, and suggests under 5% (roughly 25 g per day) for additional benefit. A daily yes/no is a blunt but honest proxy for staying under it." },
  { id:"medi", title:"Why 20 minutes of meditation", src:"8-week mindfulness program literature (MBSR-style trials)",
    body:"Most trials showing measurable changes in attention and stress markers used roughly 8 weeks of regular practice. At 20 minutes a day you cross that cumulative threshold in about 8 weeks; the Archive tracks your total hours against it." },
  { id:"nmt", title:"The one rule: never miss twice", src:"Lally et al., 2010 + habit-formation literature",
    body:"Because single omissions barely dented the automaticity curve, the protective move after a miss is immediate resumption, not compensation. That is why a missed day issues a Recovery Protocol at the minimum viable size instead of a punishment at 150%." },
];

/* ================================================================
   DEFAULT QUESTS
================================================================ */
const TODAY0 = ld();
const DEFAULT_QUESTS = [
  { id:"steps", name:"Steps", sysName:"DAILY MARCH", type:"quantity", target:10000, step:500, unit:"steps",
    recovery:6000, cat:"Movement", weight:15, schedule:{kind:"daily"}, ledger:"steps", createdAt:TODAY0, archived:false },
  { id:"workout", name:"Workout", sysName:"TRAINING GATE", type:"weekly", perWeek:5, unit:"sessions",
    cat:"Movement", weight:10, schedule:{kind:"weekly"}, ledger:"workout", createdAt:TODAY0, archived:false },
  { id:"clean", name:"Clean eating", sysName:"NO SUGAR · NO JUNK", type:"binary", unit:"day",
    recovery:1, cat:"Nutrition", weight:12, schedule:{kind:"daily"}, ledger:"clean", createdAt:TODAY0, archived:false },
  { id:"supplements", name:"Supplements", sysName:"FUEL PROTOCOL", type:"checklist", items:["Multivitamin","Protein"],
    cat:"Nutrition", weight:8, schedule:{kind:"daily"}, ledger:"supplements", createdAt:TODAY0, archived:false },
  { id:"water", name:"Water", sysName:"HYDRATION", type:"quantity", target:3, step:0.25, unit:"L",
    recovery:2, cat:"Hydration", weight:10, schedule:{kind:"daily"}, ledger:"water", createdAt:TODAY0, archived:false },
  { id:"bed", name:"In bed 22:00 · asleep 22:30", sysName:"SHUTDOWN", type:"binary", unit:"night",
    recovery:1, cat:"Sleep", weight:12.5, schedule:{kind:"daily"}, ledger:"bed", checkin:"lastNight", createdAt:TODAY0, archived:false },
  { id:"wake", name:"Wake 06:00", sysName:"FIRST LIGHT", type:"binary", unit:"morning",
    recovery:1, cat:"Sleep", weight:12.5, schedule:{kind:"daily"}, ledger:"wake", checkin:"today", createdAt:TODAY0, archived:false },
  { id:"meditation", name:"Meditation", sysName:"STILL MIND", type:"sessions", target:2, unit:"× 10 min",
    recovery:1, cat:"Mind", weight:12, schedule:{kind:"daily"}, ledger:"meditation", createdAt:TODAY0, archived:false },
  { id:"reading", name:"Reading", sysName:"PAGES", type:"quantity", target:15, step:1, unit:"pages",
    recovery:5, cat:"Mind", weight:8, schedule:{kind:"daily"}, ledger:"reading", createdAt:TODAY0, archived:false },
];

/* ================================================================
   STORE — versioned, migratable, localStorage
================================================================ */
const SKEY = "arise-v1";
const EMPTY_STORE = { v:1, quests:DEFAULT_QUESTS, log:{}, checkins:{}, seen:{}, journal:{} };
function migrate(s){
  if (!s || typeof s!=="object") return {...EMPTY_STORE};
  if (!s.v) s.v = 1;
  /* future migrations go here, keyed on s.v */
  return { ...EMPTY_STORE, ...s };
}
const loadStore = () => { try { return migrate(JSON.parse(localStorage.getItem(SKEY))); } catch(e){ return {...EMPTY_STORE}; } };
const saveStore = s => { try { localStorage.setItem(SKEY, JSON.stringify(s)); } catch(e){ console.error("save failed",e); } };

/* ================================================================
   SMALL UI ATOMS
================================================================ */
const I = {
  steps:"M4 16v-2.38C4 11.5 6.5 9 9.62 9c1.5 0 2.88.58 3.88 1.62L16 13m-6 3h.01M8 20h8M12 4h.01",
  water:"M12 2.7c3.5 4.2 6 7.6 6 10.8a6 6 0 1 1-12 0c0-3.2 2.5-6.6 6-10.8Z",
  moon:"M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z",
  sun:"M12 3v2M12 19v2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M3 12h2M19 12h2M5.6 18.4 7 17M17 7l1.4-1.4M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z",
  gym:"M6.5 6.5 17.5 17.5M4 7l3-3M17 20l3-3M3 10l7-7M14 21l7-7",
  leaf:"M11 20A7 7 0 0 1 4 13c0-5 4-9 10-10 1 6-1 10-3 12m0 0c-1.5 1.5-3.5 2-3.5 2S9 15.5 11 15",
  pill:"M10.5 20.5a5 5 0 0 1-7-7l7-7a5 5 0 0 1 7 7ZM7 10l7 7",
  book:"M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15A2.5 2.5 0 0 0 6.5 22H20",
  brain:"M12 4.5a3 3 0 0 0-5.8 1A3 3 0 0 0 4 8.5 3 3 0 0 0 5.5 14 3 3 0 0 0 9 19h3m0-14.5V19m0-14.5a3 3 0 0 1 5.8 1A3 3 0 0 1 20 8.5 3 3 0 0 1 18.5 14 3 3 0 0 1 15 19h-3",
  board:"M4 5h16M4 12h16M4 19h10",
  trend:"M3 17l6-6 4 4 8-8M21 7v5h-5",
  arch:"M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2M9 8h6",
  gear:"M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm8.5 4a8.5 8.5 0 0 1-.1 1.3l2 1.5-2 3.4-2.3-.9a8.6 8.6 0 0 1-2.2 1.3l-.4 2.4h-4l-.4-2.4a8.6 8.6 0 0 1-2.2-1.3l-2.3.9-2-3.4 2-1.5a8.6 8.6 0 0 1 0-2.6l-2-1.5 2-3.4 2.3.9A8.6 8.6 0 0 1 8.6 5l.4-2.4h4l.4 2.4a8.6 8.6 0 0 1 2.2 1.3l2.3-.9 2 3.4-2 1.5c.07.42.1.86.1 1.3Z",
};
const Icon = ({k,size=18,c="currentColor",sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={I[k]||I.board}/></svg>;
const QICON = { steps:"steps", workout:"gym", clean:"leaf", supplements:"pill", water:"water", bed:"moon", wake:"sun", meditation:"brain", reading:"book" };
const CATICON = { Sleep:"moon", Movement:"gym", Mind:"brain", Nutrition:"leaf", Hydration:"water" };
const iconOf = q => QICON[q.id] || CATICON[q.cat] || "board";

const Chevron = ({dir="right",size=15}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transform:dir==="left"?"rotate(180deg)":dir==="up"?"rotate(-90deg)":dir==="down"?"rotate(90deg)":"none",flexShrink:0}}><path d="m9 18 6-6-6-6"/></svg>;
const Check = ({size=15,c="var(--system)"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

function SysWindow({title,children,onClose,tone}){
  return (
    <div className={"syswin"+(tone==="decay"?" syswin-decay":"")} style={{marginBottom:12}}>
      <div className="syswin-head">
        <span className="syswin-dot" style={tone==="decay"?{background:"var(--decay)",boxShadow:"0 0 8px var(--decay)"}:null}/>
        <span className="sys" style={{fontSize:".625rem",fontWeight:600,color:tone==="decay"?"var(--decay)":"var(--system)"}}>{title}</span>
        {onClose && <button onClick={onClose} aria-label="Dismiss" style={{marginLeft:"auto",color:"var(--muted)",fontSize:"1.05rem",lineHeight:1,padding:"2px 6px"}}>×</button>}
      </div>
      <div style={{padding:"14px 16px 16px"}}>{children}</div>
    </div>
  );
}

function Ring({score,size=76,stroke=5,children}){
  const r=(size-stroke-2)/2, ci=2*Math.PI*r;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(140,190,255,0.10)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--system)" strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={ci} strokeDashoffset={ci*(1-Math.min(score,100)/100)} transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:"stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)",filter:"drop-shadow(0 0 6px rgba(108,178,255,0.35))"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

/* ================================================================
   QUEST CARD v2
================================================================ */
function QuestCard({q, log, today, state, onLog, onOpenEdit, compact, onExpand}){
  const isWeekly = q.schedule.kind==="weekly";
  const p = isWeekly ? state.scan.current.sessions : numP(log,today,q);
  const tgt = isWeekly ? q.perWeek : targetOf(q);
  const rec = !isWeekly && state.recoveryActive && p < tgt;
  const done = isWeekly ? numP(log,today,q)>0 : p>=tgt;
  const recDone = rec && p>=q.recovery;
  const pct = Math.min(100, 100*p/(rec && !recDone ? q.recovery : tgt));
  const A = state.A;
  const fmt = v => q.step && q.step<1 ? (+v).toFixed(2).replace(/\.?0+$/,"") : Math.round(v).toLocaleString();

  if (compact){
    return (
      <button onClick={onExpand} className="card qrow" style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:6}}>
        <span className="qicon qicon-done"><Check size={14} c="#9CCBFF"/></span>
        <span style={{fontSize:".875rem",fontWeight:500,color:"var(--muted)",textAlign:"left",flex:1,textDecoration:"line-through",textDecorationColor:"rgba(138,150,171,0.5)"}}>{q.name}</span>
        {recDone && <span className="sys" style={{fontSize:".5625rem",color:"var(--system)"}}>CHAIN RESTORED</span>}
        <span className="mono" style={{fontSize:".6875rem",color:"var(--faint)"}}>{isWeekly ? p+"/"+tgt+" wk" : fmt(Math.max(p, recDone?p:tgt))+(q.unit?" "+q.unit:"")}</span>
      </button>
    );
  }

  return (
    <div className="card qcard" style={{padding:"16px",marginBottom:10, borderColor: rec && !recDone ? "rgba(242,112,127,0.30)" : undefined}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span className="qicon" style={rec&&!recDone?{color:"var(--decay)",borderColor:"rgba(242,112,127,0.3)",background:"rgba(242,112,127,0.06)"}:null}><Icon k={iconOf(q)} size={17}/></span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>onOpenEdit(q)} style={{fontSize:".9375rem",fontWeight:600,textAlign:"left",letterSpacing:"-0.01em"}}>{q.name}</button>
            {rec && !recDone && <span className="sys" style={{fontSize:".5625rem",fontWeight:600,color:"var(--decay)"}}>RECOVERY</span>}
          </div>
          <div style={{fontSize:".6875rem",color:"var(--faint)",marginTop:1}}>
            {isWeekly ? `${state.scan.current.sessions} of ${q.perWeek} this week`
             : rec && !recDone ? `reduced target ${fmt(q.recovery)}${q.unit?" "+q.unit:""} · restart the chain`
             : `automaticity ${A.toFixed(0)}% · ${stageOf(A).toLowerCase()}`}
          </div>
        </div>
        <div className="mono" style={{fontSize:"1.0625rem",fontWeight:600,whiteSpace:"nowrap"}}>
          {q.type==="checklist" ? p : fmt(p)}<span style={{fontSize:".6875rem",color:"var(--faint)",fontWeight:400}}>/{rec&&!recDone ? fmt(q.recovery) : (q.type==="checklist"?tgt:fmt(tgt))}</span>
        </div>
      </div>

      <div className="bar" style={{margin:"12px 0"}}><i style={{width:pct+"%",background:rec&&!recDone?"linear-gradient(90deg,var(--decay),#F79AA4)":undefined}}/></div>

      <div style={{display:"flex",gap:8}}>
        {q.type==="quantity" && <>
          <button className="tapbtn" style={{width:52}} onClick={()=>onLog(q, Math.max(0, +(p - q.step).toFixed(4)))} aria-label="decrease">−</button>
          <button className="tapbtn primary" style={{flex:1}} onClick={()=>onLog(q, +(p + q.step).toFixed(4))}>
            {q.id==="water" ? "+250 ml" : `+${fmt(q.step)}${q.unit?" "+q.unit:""}`}
          </button>
          {q.id==="reading" && <button className="tapbtn" style={{width:60}} onClick={()=>onLog(q, p+5)}>+5</button>}
          {q.id==="steps" && <button className="tapbtn" style={{width:64,fontSize:".75rem"}} onClick={()=>{ const v=prompt("Today's step count (from your phone or Fitbit):", p||""); if(v!==null&&v!=="") onLog(q, Math.max(0,parseInt(v.replace(/[^0-9]/g,""))||0)); }}>enter</button>}
        </>}
        {q.type==="sessions" && Array.from({length:tgt},(_,i)=>(
          <button key={i} className={"tapbtn"+(p>i?" on":"")} style={{flex:1,gap:7}} onClick={()=>onLog(q, p>i ? i : i+1)}>
            {p>i ? <><Check size={13}/><span style={{fontSize:".75rem"}}>10 min</span></> : <span style={{fontSize:".75rem",color:"var(--muted)"}}>session {i+1}</span>}
          </button>
        ))}
        {q.type==="binary" && (
          <button className={"tapbtn"+(p>=1?" on":"")} style={{flex:1,gap:8}} onClick={()=>onLog(q, p>=1?0:1)}>
            {p>=1 ? <><Check size={14}/><span style={{fontSize:".8125rem"}}>Done</span></> : <span style={{fontSize:".8125rem",color:"var(--muted)"}}>Mark done</span>}
          </button>
        )}
        {q.type==="checklist" && q.items.map((it,i)=>{
          const v = rawP(log,today,q.id)||{}; const on = !!v[i];
          return <button key={i} className={"tapbtn"+(on?" on":"")} style={{flex:1,gap:7,fontSize:".75rem"}} onClick={()=>onLog(q, {...v,[i]:!on}, true)}>
            {on && <Check size={12}/>}{it}
          </button>;
        })}
        {q.type==="weekly" && (
          <button className={"tapbtn"+(numP(log,today,q)>0?" on":"")} style={{flex:1,gap:8}} onClick={()=>onLog(q, numP(log,today,q)>0?0:1)}>
            {numP(log,today,q)>0 ? <><Check size={14}/><span style={{fontSize:".8125rem"}}>Trained today</span></> : <span style={{fontSize:".8125rem",color:"var(--muted)"}}>Log a session</span>}
          </button>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   MORNING CHECK-IN v2
================================================================ */
function CheckIn({quests, log, today, onAnswer, onFinish}){
  const yesterday = addDays(today,-1);
  const steps = [];
  const wake = quests.find(x=>x.id==="wake" && !x.archived);
  const bed = quests.find(x=>x.id==="bed" && !x.archived);
  const clean = quests.find(x=>x.id==="clean" && !x.archived);
  if (wake) steps.push({q:wake, date:today, icon:"sun", text:"Did you wake by 06:00?"});
  if (bed && yesterday>=bed.createdAt) steps.push({q:bed, date:yesterday, icon:"moon", text:"Last night: in bed by 22:00, asleep by 22:30?"});
  if (clean && !hasP(log,yesterday,"clean") && yesterday>=clean.createdAt) steps.push({q:clean, date:yesterday, icon:"leaf", text:"Was yesterday clean? No sugar, no junk."});
  const [i,setI] = useState(0);
  const finished = i>=steps.length;
  useEffect(()=>{ if (finished) onFinish(); },[finished]);
  if (finished) return null;
  const s = steps[i];
  return (
    <SysWindow title="Morning check-in">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <span className="qicon" style={{color:"var(--system)"}}><Icon k={s.icon} size={17}/></span>
        <div style={{fontSize:"1rem",fontWeight:600,lineHeight:1.35,letterSpacing:"-0.01em"}}>{s.text}</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="tapbtn on" style={{flex:1,height:48,fontSize:".875rem",fontWeight:600}} onClick={()=>{onAnswer(s.q,s.date,1); setI(i+1);}}>Yes</button>
        <button className="tapbtn" style={{flex:1,height:48,fontSize:".875rem"}} onClick={()=>{onAnswer(s.q,s.date,0); setI(i+1);}}>No</button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14}}>
        <span style={{fontSize:".6875rem",color:"var(--faint)"}}>Honest data only. The System works on truth.</span>
        <span style={{display:"flex",gap:5}}>{steps.map((_,x)=><span key={x} style={{width:6,height:6,borderRadius:"50%",background:x<=i?"var(--system)":"rgba(140,190,255,0.18)"}}/>)}</span>
      </div>
    </SysWindow>
  );
}

/* ================================================================

================================================================ */
function TrendLine({points,w=320,h=76}){
  if (points.length<2) return null;
  const xs = points.map((p,i)=> i*(w-10)/(points.length-1)+5);
  const ys = points.map(p=> h-8-(p/100)*(h-18));
  const path = xs.map((x,i)=>`${i?"L":"M"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area = path + ` L${xs[xs.length-1].toFixed(1)},${h-4} L${xs[0].toFixed(1)},${h-4} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{display:"block"}}>
      <path d={area} fill="rgba(108,178,255,0.08)"/>
      <path d={path} fill="none" stroke="var(--system)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r={i===xs.length-1?3.5:2} fill={i===xs.length-1?"var(--system)":"rgba(108,178,255,0.45)"}/>)}
    </svg>
  );
}

function Heatmap({quests, log, today}){
  const days=91, cells=[];
  for (let i=days-1;i>=0;i--){ const d = addDays(today,-i); cells.push({d, v:vitality(quests.filter(q=>!q.archived), log, d)}); }
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(13,1fr)",gap:3}}>
      {cells.map(c=>{
        const a = c.v>=85?0.95 : c.v>=60?0.6 : c.v>=30?0.32 : c.v>0?0.15 : 0.055;
        return <div key={c.d} title={`${c.d} · ${c.v}`} style={{aspectRatio:"1",borderRadius:3,background:`rgba(108,178,255,${a})`}}/>;
      })}
    </div>
  );
}

function Progress({quests, states, log, today}){
  const active = quests.filter(q=>!q.archived);
  const week = Array.from({length:7},(_,i)=>{const d=addDays(today,-(6-i)); return {d, v:vitality(active,log,d)};});
  const avg7 = Math.round(week.reduce((s,x)=>s+x.v,0)/7);
  return (
    <div style={{animation:"fadeIn .25s"}}>
      <div className="card" style={{padding:"16px 18px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
          <span className="eyebrow">Vitality · 7 days</span>
          <span><span className="mono" style={{fontSize:"1.375rem",fontWeight:600}}>{avg7}</span><span style={{fontSize:".6875rem",color:"var(--faint)"}}> avg</span></span>
        </div>
        <TrendLine points={week.map(x=>x.v)}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,padding:"0 2px"}}>
          {week.map(x=><span key={x.d} className="mono" style={{fontSize:".5625rem",color:"var(--faint)"}}>{parseLd(x.d).toLocaleDateString("en",{weekday:"narrow"})}</span>)}
        </div>
      </div>

      <div className="card" style={{padding:"16px 18px",marginBottom:18}}>
        <span className="eyebrow">Last 13 weeks</span>
        <div style={{marginTop:12}}><Heatmap quests={quests} log={log} today={today}/></div>
      </div>

      <span className="eyebrow" style={{display:"block",margin:"0 2px 10px"}}>Automaticity · the real level</span>
      <div className="card" style={{padding:"6px 18px",marginBottom:18}}>
        {active.map((q,idx)=>{
          const A = states[q.id].A;
          return (
            <div key={q.id} style={{padding:"13px 0",borderTop:idx?"1px solid var(--line-soft)":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                <span style={{fontSize:".875rem",fontWeight:500,display:"flex",gap:9,alignItems:"center"}}><Icon k={iconOf(q)} size={14} c="var(--muted)"/>{q.name}</span>
                <span><span className="mono" style={{fontSize:".9375rem",fontWeight:600,color:A>=70?"var(--system)":"var(--text)"}}>{A.toFixed(1)}</span><span style={{fontSize:".625rem",color:"var(--faint)"}}>% · {stageOf(A).toLowerCase()}</span></span>
              </div>
              <div className="bar" style={{height:4}}><i style={{width:A+"%"}}/></div>
            </div>
          );
        })}
        <div className="mono" style={{fontSize:".625rem",color:"var(--faint)",padding:"10px 0 12px"}}>installs at 95% · ≈66 honest reps · one miss costs nothing, two in a row starts decay</div>
      </div>

      <span className="eyebrow" style={{display:"block",margin:"0 2px 10px"}}>Impact ledger · real quantities</span>
      <div className="card" style={{padding:"6px 18px",marginBottom:8}}>
        {active.map((q,idx)=>{
          const L = ledgerFor(q,log); if(!L) return null;
          const fmtV = v => L.unit==="km"||L.unit==="h" ? v.toFixed(1) : Math.round(v).toLocaleString();
          return (
            <div key={q.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,padding:"13px 0",borderTop:idx?"1px solid var(--line-soft)":"none"}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:".875rem",fontWeight:500}}>{q.name}</div>
                <div style={{fontSize:".6875rem",color:"var(--faint)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{L.next ? "next: "+L.next[1] : "all listed milestones reached"}</div>
              </div>
              <div className="mono" style={{fontSize:"1.0625rem",fontWeight:600,whiteSpace:"nowrap"}}>{fmtV(L.val)}<span style={{fontSize:".625rem",color:"var(--faint)",fontWeight:400}}> {L.unit}</span></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ================================================================
   ARCHIVE
================================================================ */
function Archive({quests, log}){
  const active = quests.filter(q=>!q.archived);
  const reached = [];
  for (const q of active){ const L=ledgerFor(q,log); if(L) L.hit.forEach(([v,label])=>reached.push({q:q.name,label,icon:iconOf(q)})); }
  const [open,setOpen] = useState(null);
  return (
    <div style={{animation:"fadeIn .25s"}}>
      <span className="eyebrow" style={{display:"block",margin:"0 2px 10px"}}>Milestones reached</span>
      {reached.length===0
        ? <div className="card" style={{padding:"16px 18px",fontSize:".8125rem",color:"var(--muted)",lineHeight:1.55}}>Nothing yet, and that is the point: every entry here will be a quantity you actually accumulated. The first ones land within a week or two of honest logging.</div>
        : <div className="card" style={{padding:"6px 18px"}}>{reached.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 0",borderTop:i?"1px solid var(--line-soft)":"none"}}>
              <span className="qicon" style={{width:30,height:30}}><Icon k={m.icon} size={14}/></span>
              <div><div style={{fontSize:".8125rem",fontWeight:600}}>{m.label}</div><div style={{fontSize:".6875rem",color:"var(--faint)"}}>{m.q}</div></div>
            </div>))}</div>}
      <span className="eyebrow" style={{display:"block",margin:"18px 2px 10px"}}>The evidence</span>
      <div style={{fontSize:".75rem",color:"var(--muted)",margin:"0 2px 10px",lineHeight:1.5}}>Every mechanic is built on one of these. Associations found in research, not promises.</div>
      {EVIDENCE.map(e=>(
        <div key={e.id} className="card" style={{marginBottom:8,overflow:"hidden"}}>
          <button className="rowbtn" style={{border:"none",background:"none"}} onClick={()=>setOpen(open===e.id?null:e.id)}>
            <span style={{textAlign:"left"}}>{e.title}</span><Chevron dir={open===e.id?"down":"right"}/>
          </button>
          {open===e.id && <div style={{padding:"0 16px 15px",animation:"fadeIn .2s"}}>
            <div style={{fontSize:".8125rem",lineHeight:1.6}}>{e.body}</div>
            <div className="mono" style={{fontSize:".625rem",color:"var(--faint)",marginTop:9}}>{e.src}</div>
          </div>}
        </div>
      ))}
    </div>
  );
}

          {q.type==="weekly" && <div className="field"><label>Sessions per week</label><input type="number" value={f.perWeek} onChange={e=>set("perWeek",e.target.value)}/></div>}

          </div>

            name:f.name, sysName:f.sysName, target:parseFloat(f.target)||q.target, step:parseFloat(f.step)||q.step,
            unit:f.unit, perWeek:parseInt(f.perWeek)||q.perWeek, weight:parseFloat(f.weight)||q.weight, cat:f.cat,

function Settings({store, setStore, onOpenEdit, onAddQuest}){
  const fileRef = useRef();
  const exportData = () => {
    const blob = new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`arise-backup-${ld()}.json`; a.click();
  };
  const importData = e => {
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{ setStore(migrate(JSON.parse(ev.target.result))); alert("Data restored."); }catch(x){ alert("That file could not be read. It must be an Arise backup JSON."); } };
    r.readAsText(f); e.target.value="";
  };
  return (
    <div style={{animation:"fadeIn .25s"}}>
      <span className="eyebrow" style={{display:"block",margin:"0 2px 10px"}}>Quests</span>
      <div className="card" style={{padding:"4px 6px",marginBottom:10}}>
        {store.quests.map((q,i)=>(
          <button key={q.id} className="rowbtn" style={{border:"none",background:"none",opacity:q.archived?0.45:1,borderTop:i?"1px solid var(--line-soft)":"none",borderRadius:0}} onClick={()=>onOpenEdit(q)}>
            <span style={{textAlign:"left",display:"flex",gap:11,alignItems:"center"}}><Icon k={iconOf(q)} size={15} c="var(--muted)"/>{q.name}{q.archived?" · archived":""}</span><Chevron/>
          </button>
        ))}
      </div>
      <button className="rowbtn" style={{marginBottom:6,borderStyle:"dashed",color:"var(--muted)"}} onClick={onAddQuest}>
        <span>New quest</span><span style={{fontSize:"1.05rem"}}>+</span>
      </button>

      <span className="eyebrow" style={{display:"block",margin:"18px 2px 10px"}}>Reminders · one-time iPhone setup</span>
      <div className="card" style={{padding:"16px 18px",fontSize:".8125rem",lineHeight:1.6}}>
        <p style={{marginBottom:10,color:"var(--muted)"}}>Arise cannot wake your phone from the browser, but iOS can. Set these once in the Shortcuts app; they run daily, forever, free:</p>
        <p style={{marginBottom:12}}>Shortcuts app → Automation → + → <b>Time of Day</b> → set time, Daily → choose <b>Run Immediately: Off</b> → Next → search the action <b>Show Notification</b> → type the text below → Done. Repeat per row.</p>
        {REMINDERS.map(([t,txt])=>(
          <div key={t} style={{display:"flex",gap:14,padding:"8px 0",borderTop:"1px solid var(--line-soft)"}}>
            <span className="mono" style={{color:"var(--system)",fontSize:".75rem",fontWeight:600,width:44,flexShrink:0}}>{t}</span>
            <span style={{fontSize:".8125rem"}}>{txt}</span>
          </div>
        ))}
      </div>

      <span className="eyebrow" style={{display:"block",margin:"18px 2px 10px"}}>Data</span>
      <button className="rowbtn" style={{marginBottom:6}} onClick={exportData}><span>Export backup (JSON)</span><Chevron/></button>
      <button className="rowbtn" style={{marginBottom:6}} onClick={()=>fileRef.current.click()}><span>Restore from backup</span><Chevron/></button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
      <button className="rowbtn" style={{marginBottom:6,color:"var(--decay)"}} onClick={()=>{ if(confirm("Erase ALL Arise data on this device? Export a backup first.")) setStore({...EMPTY_STORE, quests:DEFAULT_QUESTS.map(q=>({...q,createdAt:ld()}))}); }}>
        <span>Erase everything</span><Chevron/>
      </button>
      <div style={{fontSize:".6875rem",color:"var(--faint)",margin:"10px 2px 0",lineHeight:1.5}}>
        Data lives only in this browser until sync ships in phase 2. Export a backup weekly.
      </div>
    </div>
  );
}

/* ================================================================
   APP
================================================================ */
function App(){
  const [store,setStoreRaw] = useState(loadStore);
  const [tab,setTab] = useState("board");
  const [today,setToday] = useState(ld());
  const [editQ,setEditQ] = useState(null);
  const [toast,setToast] = useState(null);
  const [expanded,setExpanded] = useState({});
  const setStore = useCallback(u=>{ setStoreRaw(prev=>{ const next = typeof u==="function"?u(prev):u; saveStore(next); return next; }); },[]);

  useEffect(()=>{ const t=setInterval(()=>{ const n=ld(); setToday(p=>p===n?p:n); },30000); return ()=>clearInterval(t); },[]);

  const active = store.quests.filter(q=>!q.archived);
  const states = useMemo(()=>{ const m={}; for(const q of active) m[q.id]=questState(q,store.log,today); return m; },[store.quests,store.log,today]);
  const vToday = useMemo(()=>vitality(active,store.log,today),[store.quests,store.log,today]);
  const meanA = active.length? active.reduce((s,q)=>s+states[q.id].A,0)/active.length : 0;
  const RANKS=[[0,"E"],[15,"D"],[30,"C"],[45,"B"],[60,"A"],[75,"S"],[88,"SS"],[95,"Monarch"]];
  const rank = RANKS.reduce((r,[m,t])=>meanA>=m?t:r,"E");

  const needCheckin = !store.checkins[today];
  const showWelcome = !store.seen.welcome;

  const logValue = useCallback((q, value, isObj)=>{
    setStore(prev=>{
      const day = {...(prev.log[today]||{})};
      day[q.id] = value;
      const log = {...prev.log,[today]:day};
      const before = ledgerFor(q, prev.log), after = ledgerFor(q, log);
      let seen = prev.seen, t=null;
      if (before && after){
        const newly = after.hit.filter(([v])=>!before.hit.some(([bv])=>bv===v));
        for (const [v,label] of newly){ const id=q.id+"_"+v; if(!prev.seen[id]){ seen={...seen,[id]:true}; t={title:"Milestone",body:label,sub:q.name}; } }
      }
      if (t){ setToast(t); setTimeout(()=>setToast(null),4200); }
      return {...prev, log, seen};
    });
  },[today,setStore]);

  const answerCheckin = (q,date,val)=> setStore(prev=>({...prev, log:{...prev.log,[date]:{...(prev.log[date]||{}),[q.id]:val}}}));
  const finishCheckin = ()=> setStore(prev=>({...prev, checkins:{...prev.checkins,[today]:true}}));
  const saveQuest = (patch)=>{ setStore(prev=>({...prev, quests:prev.quests.map(x=>x.id===editQ.id?{...x,...patch}:x)})); setEditQ(null); };
  const archiveQuest = ()=>{ setStore(prev=>({...prev, quests:prev.quests.map(x=>x.id===editQ.id?{...x,archived:!x.archived}:x)})); setEditQ(null); };
  const addQuest = ()=>{
    const name = prompt("Quest name:"); if(!name) return;
    const q = { id:"q"+Date.now().toString(36), name, sysName:name.toUpperCase(), type:"quantity", target:1, step:1, unit:"", recovery:undefined,
      cat:"Mind", weight:10, schedule:{kind:"daily"}, ledger:null, createdAt:ld(), archived:false };
    setStore(prev=>({...prev,quests:[...prev.quests,q]}));
    setEditQ(q);
  };

  const isDone = q => q.schedule.kind==="weekly" ? numP(store.log,today,q)>0 : numP(store.log,today,q)>=targetOf(q);
  const recoveries = active.filter(q=>q.schedule.kind!=="weekly" && states[q.id].recoveryActive && numP(store.log,today,q) < targetOf(q));
  const recSet = new Set(recoveries.map(q=>q.id));
  const openQuests = active.filter(q=>!isDone(q)).sort((a,b)=>(recSet.has(b.id)-recSet.has(a.id)));
  const doneQuests = active.filter(isDone);
  const clearedCount = doneQuests.length, totalCount = active.length;

  const TABS=[["board","Board","board"],["progress","Progress","trend"],["archive","Archive","arch"],["settings","Settings","gear"]];

  return (
    <div style={{maxWidth:520,margin:"0 auto",padding:"10px 16px calc(86px + env(safe-area-inset-bottom))"}}>
      <header style={{paddingTop:"calc(env(safe-area-inset-top) + 6px)",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span className="sys" style={{fontSize:".8125rem",fontWeight:700,letterSpacing:".3em",color:"var(--text)"}}>ARISE</span>
          <button className="pill" onClick={()=>setTab("progress")}>
            <span className="sys" style={{fontSize:".5625rem",color:"var(--system)",fontWeight:600}}>{rank}-rank</span>
            <span className="mono" style={{fontSize:".625rem"}}>{meanA.toFixed(0)}%</span>
          </button>
        </div>
        {tab==="board" && (
          <div style={{display:"flex",alignItems:"center",gap:18}}>
            <Ring score={vToday} size={82}>
              <span className="mono" style={{fontSize:"1.5rem",fontWeight:600,lineHeight:1}}>{vToday}</span>
              <span className="eyebrow" style={{fontSize:".5rem",marginTop:2}}>Vitality</span>
            </Ring>
            <div>
              <div style={{fontSize:"1.25rem",fontWeight:700,letterSpacing:"-0.02em"}}>{parseLd(today).toLocaleDateString("en-GB",{weekday:"long"})}</div>
              <div style={{fontSize:".75rem",color:"var(--muted)",marginTop:2}}>{parseLd(today).toLocaleDateString("en-GB",{day:"numeric",month:"long"})}</div>
              <div style={{fontSize:".75rem",color:clearedCount===totalCount&&totalCount>0?"var(--system)":"var(--faint)",marginTop:7}}>
                {clearedCount===totalCount&&totalCount>0 ? "All quests cleared." : `${clearedCount} of ${totalCount} quests cleared`}
              </div>
            </div>
          </div>
        )}
      </header>

      {toast && (
        <div style={{position:"fixed",top:"calc(10px + env(safe-area-inset-top))",left:"50%",transform:"translateX(-50%)",zIndex:200,width:"min(92%,460px)"}}>
          <SysWindow title="Milestone" onClose={()=>setToast(null)}>
            <div style={{fontSize:".9375rem",fontWeight:600}}>{toast.body}</div>
            <div style={{fontSize:".6875rem",color:"var(--muted)",marginTop:3}}>{toast.sub} · a real quantity, not a badge</div>
          </SysWindow>
        </div>
      )}

      {tab==="board" && (
        <div style={{animation:"fadeIn .25s"}}>
          {showWelcome && (
            <SysWindow title="System online" onClose={()=>setStore(p=>({...p,seen:{...p.seen,welcome:true}}))}>
              <div style={{fontSize:".8125rem",lineHeight:1.6,color:"var(--text)"}}>
                Three numbers run this system, and all of them are real. <b>Automaticity</b> is each habit's position on the 66-day formation curve from the UCL research. The <b>Vitality</b> ring is today, weighted by health impact. The <b>ledger</b> counts true kilometres, litres, pages and hours. Miss a day and almost nothing happens. Miss two and decay begins. Never miss twice.
              </div>
            </SysWindow>
          )}
          {needCheckin && <CheckIn quests={store.quests} log={store.log} today={today} onAnswer={answerCheckin} onFinish={finishCheckin}/>}
          {!needCheckin && recoveries.length>0 && (
            <SysWindow title="Recovery protocol" tone="decay">
              <div style={{fontSize:".8125rem",lineHeight:1.55}}>
                {recoveries.length===1 ? "One quest was missed yesterday." : recoveries.length+" quests were missed yesterday."} The rule is never miss twice: clear the reduced target today and the chain counts as unbroken.
              </div>
            </SysWindow>
          )}
          {openQuests.map(q=><QuestCard key={q.id} q={q} log={store.log} today={today} state={states[q.id]} onLog={logValue} onOpenEdit={setEditQ}/>)}
          {doneQuests.length>0 && <div className="eyebrow" style={{margin:"18px 2px 8px"}}>Cleared</div>}
          {doneQuests.map(q=> expanded[q.id]
            ? <QuestCard key={q.id} q={q} log={store.log} today={today} state={states[q.id]} onLog={logValue} onOpenEdit={setEditQ}/>
            : <QuestCard key={q.id} q={q} log={store.log} today={today} state={states[q.id]} onLog={logValue} onOpenEdit={setEditQ} compact onExpand={()=>setExpanded(e=>({...e,[q.id]:true}))}/>)}
        </div>
      )}
      {tab==="progress" && <Progress quests={store.quests} states={states} log={store.log} today={today}/>}
      {tab==="archive" && <Archive quests={store.quests} log={store.log}/>}
      {tab==="settings" && <Settings store={store} setStore={setStore} onOpenEdit={setEditQ} onAddQuest={addQuest}/>}

      {editQ && <QuestEditor q={editQ} onSave={saveQuest} onArchive={archiveQuest} onClose={()=>setEditQ(null)}/>}

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(6,10,19,0.86)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:"1px solid var(--line-soft)",paddingBottom:"env(safe-area-inset-bottom)",zIndex:50}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
          {TABS.map(([k,l,ic])=>(
            <button key={k} onClick={()=>{setTab(k);window.scrollTo(0,0);}} style={{flex:1,padding:"11px 0 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===k?"var(--system)":"var(--faint)",transition:"color .15s"}}>
              <Icon k={ic} size={19} sw={tab===k?2:1.6}/>
              <span style={{fontSize:".5625rem",fontWeight:600,letterSpacing:".06em"}}>{l}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

/* PWA */
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
